<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta property="og:title" content="Eid Mubarak Greeting Card">
    <meta property="og:description" content="Share the joy of Eid with this beautiful greeting card!">
    <link rel="stylesheet" href="styles.css">
    <title>Eid Mubarak</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(to bottom right, #A50031, #00436b);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.1);
            text-align: center;
            animation: fadeIn 0.5s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        .logo {
            width: 100px;
        }
        .share-buttons {
            margin-top: 20px;
        }
        .share-button {
            margin: 5px;
            background: #007bff;
            color: white;
            border: none;
            border-radius: 5px;
            padding: 10px 15px;
            cursor: pointer;
            transition: background 0.3s;
        }
        .share-button:hover {
            background: #0056b3;
        }
    </style>
</head>
<body>
    <div class="card">
        <img src="barcelona_logo.png" alt="Barcelona Logo" class="logo">
        <h1>Eid Mubarak!</h1>
        <p>May the blessings of Allah fill your life with happiness and open all the doors of success now and always.</p>
        <div class="share-buttons">
            <button class="share-button" onclick="shareOnFacebook()">Share on Facebook</button>
            <button class="share-button" onclick="shareOnTwitter()">Share on Twitter</button>
            <button class="share-button" onclick="shareOnWhatsApp()">Share on WhatsApp</button>
            <button class="share-button" onclick="shareOnTelegram()">Share on Telegram</button>
            <button class="share-button" onclick="copyLink()">Copy Link</button>
            <button class="share-button" onclick="downloadCard()">Download Card</button>
        </div>
    </div>
    <script>
        function shareOnFacebook() {
            // Facebook sharing logic
            const url = window.location.href;
            window.open(`https://www.facebook.com/sharer/sharer.php?u=${encodeURIComponent(url)}`);
        }

        function shareOnTwitter() {
            // Twitter sharing logic
            const url = window.location.href;
            window.open(`https://twitter.com/intent/tweet?url=${encodeURIComponent(url)}&text=Eid%20Mubarak!`);
        }

        function shareOnWhatsApp() {
            // WhatsApp sharing logic
            const url = window.location.href;
            window.open(`https://api.whatsapp.com/send?text=Eid%20Mubarak!%20${encodeURIComponent(url)}`);
        }

        function shareOnTelegram() {
            // Telegram sharing logic
            const url = window.location.href;
            window.open(`https://t.me/share/url?url=${encodeURIComponent(url)}&text=Eid%20Mubarak!`);
        }

        function copyLink() {
            // Copy link to clipboard
            navigator.clipboard.writeText(window.location.href);
            alert('Link copied to clipboard!');
        }

        function downloadCard() {
            // Download card logic
            const a = document.createElement('a');
            a.href = document.querySelector('.card').innerHTML; // Placeholder for card content
            a.download = 'eid_mubarak_card.html';
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
        }
    </script>
</body>
</html>
